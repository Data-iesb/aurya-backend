name: Deploy Backend

on:
  push:
    branches: [v1]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ECR_REPO: 248189947068.dkr.ecr.us-east-1.amazonaws.com/aurya-backend-v2
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 248189947068.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push image
        run: |
          docker build -t $ECR_REPO:latest -t $ECR_REPO:${{ github.sha }} .
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name dataiesb-cluster --region us-east-1

      - name: Apply manifests
        run: kubectl apply -f k8s/configmap.yaml -f k8s/backend.yaml --validate=false

      - name: Use commit image
        run: kubectl set image deployment/aurya-backend backend=$ECR_REPO:${{ github.sha }} -n custom --validate=false

      - name: Wait for rollout
        run: kubectl rollout status deployment aurya-backend -n custom --timeout=120s
